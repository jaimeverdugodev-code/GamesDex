<ion-content>
  <div class="login-wrapper">

    <div class="bg-decorations">
      <div class="glow-circle top-left"></div>
      <div class="glow-circle bottom-right"></div>
    </div>

    <div *ngIf="isCheckingAuth" class="auth-check-spinner">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <div class="content-container" *ngIf="!isCheckingAuth">
      
      <div class="header-section">
        <div class="logo-box">
          <img src="assets/icon/GamesDexLogo.png" alt="GamesDex" class="logo-img" />
        </div>
        <h1>Bienvenido de vuelta</h1>
        <p>Inicia sesión para continuar jugando</p>
      </div>

      <div class="form-card">
        <form (ngSubmit)="onSubmit()" novalidate>
          
          <div class="input-group">
            <label for="email">Email</label>
            <input 
              id="email" 
              name="email"
              type="email" 
              [(ngModel)]="email" 
              placeholder="tu@email.com" 
              class="custom-input"
            />
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrapper">
              <input 
                id="password" 
                name="password"
                [type]="showPassword ? 'text' : 'password'" 
                [(ngModel)]="password" 
                placeholder="••••••••" 
                class="custom-input"
              />
              <button type="button" class="btn-icon" (click)="togglePasswordVisibility()">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
          </div>

          <div class="form-actions">
            <ion-button fill="clear" size="small" (click)="presentResetPasswordAlert()">¿Olvidaste tu contraseña?</ion-button>
          </div>

          <div class="error-msg" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading">
            <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
            <span *ngIf="!isLoading">Iniciar Sesión</span>
          </button>
        </form>

        <div class="divider">
          <div class="line"></div>
          <span>O continuar con</span>
          <div class="line"></div>
        </div>

        <div class="social-login">
          <button type="button" class="btn-social" (click)="loginWithGoogle()">
            <ion-icon name="logo-google" style="color: #4285F4;"></ion-icon>
            <span>Google</span>
          </button>
        </div>
      </div>

      <p class="register-prompt">
        ¿No tienes cuenta? <a routerLink="/register" class="link-primary bold">Regístrate gratis</a>
      </p>

    </div>
  </div>
</ion-content>
